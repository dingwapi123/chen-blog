# Netlify site settings: Package directory = apps/cms-admin; leave Base directory unset.
[build]
  command = "pnpm --filter @chen-blog/cms-admin build"
  publish = "apps/cms-admin/dist"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10.29.1"

[[headers]]
  for = "/*"

  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Content-Security-Policy = "frame-ancestors 'none'"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
